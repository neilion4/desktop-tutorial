<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Album</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>My Photo Album</h1>
    <button id="add-btn" class="btn-primary">+ 사진 추가</button>
  </header>

  <main>
    <div id="gallery" class="gallery"></div>
    <p id="empty-msg" class="empty-msg">사진이 없습니다. "사진 추가" 버튼을 눌러 시작하세요!</p>
  </main>

  <!-- Add Photo Modal -->
  <div id="add-modal" class="modal hidden">
    <div class="modal-content">
      <h2>사진 추가</h2>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="upload">파일 업로드</button>
        <button class="tab" data-tab="url">URL 입력</button>
      </div>

      <!-- Upload Tab -->
      <div id="tab-upload" class="tab-panel">
        <div id="drop-zone" class="drop-zone">
          <input id="file-input" type="file" accept="image/*" hidden />
          <div class="drop-zone-inner">
            <span class="drop-icon">📁</span>
            <p>클릭하거나 이미지를 드래그하세요</p>
            <p class="drop-hint">JPG, PNG, GIF, WEBP 지원</p>
          </div>
        </div>
        <div id="preview-wrap" class="preview-wrap hidden">
          <img id="preview-img" src="" alt="미리보기" />
          <button id="preview-remove" class="preview-remove">다시 선택</button>
        </div>
      </div>

      <!-- URL Tab -->
      <div id="tab-url" class="tab-panel hidden">
        <label for="photo-url">이미지 URL</label>
        <input id="photo-url" type="text" placeholder="https://example.com/photo.jpg" />
      </div>

      <!-- Common Fields -->
      <label for="photo-title">제목</label>
      <input id="photo-title" type="text" placeholder="사진 제목" />
      <label for="photo-desc">설명 (선택)</label>
      <textarea id="photo-desc" placeholder="간단한 설명..."></textarea>

      <div class="modal-actions">
        <button id="cancel-btn" class="btn-secondary">취소</button>
        <button id="save-btn" class="btn-primary">저장</button>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div id="confirm-modal" class="modal hidden">
    <div class="modal-content modal-confirm">
      <h2>사진 삭제</h2>
      <p>이 사진을 삭제하시겠습니까?</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn-secondary">취소</button>
        <button id="confirm-delete" class="btn-danger">삭제</button>
      </div>
    </div>
  </div>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="modal hidden">
    <div class="lightbox-overlay" id="lightbox-close"></div>
    <div class="lightbox-content">
      <button class="lightbox-close-btn" id="lightbox-close-btn">&times;</button>
      <img id="lightbox-img" src="" alt="" />
      <div class="lightbox-info">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-desc"></p>
        <span id="lightbox-date" class="lightbox-date"></span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
