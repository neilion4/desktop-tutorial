<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - Photo Album</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <style>
    body { background-color: #f8f9fa; }
    .login-card {
      max-width: 420px;
      margin: 80px auto;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .login-card .card-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px 12px 0 0;
      text-align: center;
      padding: 1.5rem;
    }
    .btn-google {
      background-color: #fff;
      color: #444;
      border: 1px solid #ddd;
    }
    .btn-google:hover { background-color: #f1f1f1; }
    .btn-apple {
      background-color: #000;
      color: #fff;
      border: 1px solid #000;
    }
    .btn-apple:hover { background-color: #222; }
    .divider {
      display: flex;
      align-items: center;
      margin: 1rem 0;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #dee2e6;
    }
    .divider span { padding: 0 0.75rem; color: #6c757d; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="login-card card">
    <div class="card-header">
      <h4 class="mb-0">Photo Album 로그인</h4>
    </div>
    <div class="card-body p-4">

      <!-- 성공/에러/로그아웃 메시지 -->
      <div th:if="${param.registered}" class="alert alert-success" role="alert">
        회원가입이 완료되었습니다. 로그인해 주세요.
      </div>
      <div th:if="${param.logout}" class="alert alert-info" role="alert">
        로그아웃 되었습니다.
      </div>
      <div th:if="${param.error}" class="alert alert-danger" role="alert">
        이메일 또는 패스워드가 올바르지 않습니다.
      </div>

      <!-- 이메일/패스워드 로그인 폼 -->
      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="mb-3">
          <label for="email" class="form-label">이메일</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="example@email.com" required autofocus />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">패스워드</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="패스워드 입력" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">로그인</button>
      </form>

      <!-- OAuth2 버튼 -->
      <div th:if="${#lists.size(oauthProviders) > 0}">
        <div class="divider"><span>또는 소셜 로그인</span></div>

        <a th:if="${#lists.contains(oauthProviders, 'google')}"
           href="/oauth2/authorization/google"
           class="btn btn-google w-100 mb-2 d-flex align-items-center justify-content-center gap-2">
          <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Google로 로그인
        </a>

        <a th:if="${#lists.contains(oauthProviders, 'apple')}"
           href="/oauth2/authorization/apple"
           class="btn btn-apple w-100 mb-2 d-flex align-items-center justify-content-center gap-2">
          <svg width="16" height="18" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg" fill="white">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105-57.8-155.5-127.4C46 530.7 0 402.3 0 280.2c0-208 135.6-318.1 269-318.1 71 0 130.6 46.8 174.9 46.8 42.6 0 109.3-49.5 189.2-49.5 30.2 0 108.2 2.6 168.5 80.1zm-237.2-123.1c-31.8-39.9-84.5-69.2-136.4-69.2-6.5 0-13 .6-19.5 1.3 1.9 41.5 17.5 83 43.4 112.4 26.5 30.1 75.6 56.6 123.8 59.2 4.5 0 9 .6 13.5.6.6-5.2 1.3-10.4 1.3-15.6 0-38.6-16.2-79.4-26.1-88.7z"/>
          </svg>
          Apple로 로그인
        </a>
      </div>

      <hr class="my-3" />
      <p class="text-center text-muted mb-0">
        계정이 없으신가요?
        <a th:href="@{/register}">회원가입</a>
      </p>
    </div>
  </div>
</body>
</html>
